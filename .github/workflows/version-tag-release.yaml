name: Release-R-Package

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (example: v0.4.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::pkgbuild
          needs: check

      - name: Build source package
        shell: pwsh
        run: |
          Rscript -e "pkgbuild::build(path = '.')"

      - name: Build Windows binary
        shell: pwsh
        run: |
          Rscript -e "pkgbuild::build(binary = TRUE, path = '.')"

      - name: Show built files
        shell: pwsh
        run: |
          Get-ChildItem

      - name: Determine tag name
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.tag }}" -ne "") {
            echo "TAG=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "TAG=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Release ${{ steps.tag.outputs.TAG }}
          files: |
            *.zip
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}